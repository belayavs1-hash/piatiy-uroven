<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест фона</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Inter", "Segoe UI", Arial, sans-serif;
  min-height: 100vh;
  background: url('bg1.png') center/cover no-repeat fixed;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}

.card {
  width: 780px;
  max-width: calc(100vw - 40px);
  background: rgba(255,255,255,0.95);
  border-radius: 38px;
  overflow: hidden;
  box-shadow: 0 30px 80px rgba(0,0,0,.35);
}

/* Шапка */
.card-header {
  width: 100%;
  height: 260px;
  background: url('header.png') center/cover no-repeat;
}

/* Тело */
.card-body {
  padding: 48px 56px 52px;
}

/* Поле имени */
.field-label {
  font-size: 26px;
  font-weight: 900;
  color: #071b52;
  margin-bottom: 16px;
  display: block;
}
.name-row {
  display: grid;
  grid-template-columns: 1fr 78px;
  gap: 14px;
  margin-bottom: 36px;
}
.name-input {
  height: 78px;
  border-radius: 20px;
  border: 2px solid #d9e3ff;
  padding: 0 28px;
  font-size: 22px;
  color: #071b52;
  outline: none;
  font-family: inherit;
  transition: border-color .18s;
}
.name-input:focus { border-color: #7b93ff; }
.name-input::placeholder { color: #9aa7c8; }
.mic-btn {
  height: 78px;
  border-radius: 20px;
  border: 2px solid #d9e3ff;
  background: #fbfcff;
  font-size: 30px;
  cursor: pointer;
  display: grid;
  place-items: center;
  transition: background .18s;
}
.mic-btn:hover { background: #f1f5ff; }

/* Карточки роли */
.roles-label {
  font-size: 26px;
  font-weight: 900;
  color: #071b52;
  margin-bottom: 20px;
  display: block;
}
.roles-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  margin-bottom: 36px;
}
.role-card {
  border: 3px solid #6d86ff;
  border-radius: 28px;
  overflow: hidden;
  cursor: pointer;
  background: #fff;
  padding: 0;
  transition: transform .2s, box-shadow .2s, border-color .2s;
  box-shadow: 0 18px 35px rgba(55,95,220,.18);
  position: relative;
}
.role-card:hover { transform: translateY(-4px); }
.role-card.selected {
  border-color: #35c981;
  box-shadow: 0 0 0 6px rgba(53,201,129,.16), 0 18px 35px rgba(55,95,220,.22);
}
.role-card.selected::after {
  content: "✓";
  position: absolute;
  top: 14px; right: 14px;
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, #35c981, #2bb46f);
  color: #fff;
  font-weight: 900;
  font-size: 18px;
  display: grid;
  place-items: center;
  box-shadow: 0 6px 16px rgba(53,201,129,.4);
}

/* Фото — фон карточки */
.role-photo {
  width: 100%;
  height: 300px;
  background-size: cover;
  background-position: center top;
  position: relative;
}
.student-photo { background-image: url('student.png'); }
.parent-photo  { background-image: url('parent.png'); }

/* Белая плашка поверх фото */
.role-plashka {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: #fff;
  padding: 18px 22px 22px;
  display: flex;
  align-items: center;
  gap: 16px;
  border-top: 1px solid rgba(0,0,0,.06);
}
.role-icon {
  width: 62px; height: 62px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  font-size: 30px;
  flex-shrink: 0;
}
.role-icon.blue { background: #edf4ff; }
.role-icon.orange { background: #fff1d9; }
.role-name {
  font-size: 24px;
  font-weight: 900;
  color: #071b52;
  margin-bottom: 4px;
}
.role-hint {
  font-size: 16px;
  color: #6c789c;
  line-height: 1.3;
}

/* Кнопка */
.go-btn {
  width: 100%;
  height: 88px;
  border: none;
  border-radius: 26px;
  background: linear-gradient(90deg, #1e9bff 0%, #8a2cff 100%);
  color: #fff;
  font-size: 30px;
  font-weight: 900;
  cursor: pointer;
  font-family: inherit;
  box-shadow: 0 18px 35px rgba(91,70,255,.32);
  transition: transform .2s, box-shadow .2s;
}
.go-btn:hover { transform: translateY(-3px); box-shadow: 0 26px 45px rgba(91,70,255,.4); }
</style>
</head>
<body>

<div class="card">
  <div class="card-header"></div>
  <div class="card-body">

    <label class="field-label">Как тебя зовут?</label>
    <div class="name-row">
      <input class="name-input" type="text" placeholder="Например: Маша" id="nameInput">
      <button class="mic-btn">🎤</button>
    </div>

    <label class="roles-label">Кто ты?</label>
    <div class="roles-grid">

      <button class="role-card" data-role="student" onclick="selectRole(this)">
        <div class="role-photo student-photo">
          <div class="role-plashka">
            <div class="role-icon blue">🎓</div>
            <div>
              <div class="role-name">Ученик</div>
              <div class="role-hint">Учусь сам</div>
            </div>
          </div>
        </div>
      </button>

      <button class="role-card" data-role="parent" onclick="selectRole(this)">
        <div class="role-photo parent-photo">
          <div class="role-plashka">
            <div class="role-icon orange">👥</div>
            <div>
              <div class="role-name">Родитель</div>
              <div class="role-hint">Помогаю и слежу за успехами</div>
            </div>
          </div>
        </div>
      </button>

    </div>

    <button class="go-btn">Поехали! 🚀</button>
  </div>
</div>

<script>
function selectRole(btn) {
  document.querySelectorAll('.role-card').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}
</script>
</body>
</html>
